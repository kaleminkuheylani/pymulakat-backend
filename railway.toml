# Railway cron — minimized usage
# Gunde 1 sitemap refresh yeterli (Google zaten periyodik tarar).
# Saat 03:00 UTC = Turkiye 06:00 saatleri (sabah), dusuk trafik.

[[crons]]
name = "sitemap-refresh"
schedule = "0 3 * * *"  # Her gece 03:00 UTC (Turkiye 06:00)
command = "curl -X POST ${RAILWAY_PUBLIC_DOMAIN}/admin/cron/refresh-sitemap -H 'X-Cron-Secret: ${CRON_SECRET}'"
path = "/admin/cron/refresh-sitemap"
method = "POST"
